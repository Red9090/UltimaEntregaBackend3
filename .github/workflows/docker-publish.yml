name: Build and Push Docker Image to DockerHub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: red9090/fullstack-project:latest
          cache-from: type=registry,ref=red9090/fullstack-project:buildcache
          cache-to: type=registry,ref=red9090/fullstack-project:buildcache,mode=max

      - name: Image digest
        run: echo "Image digest: ${{ steps.build-push.outputs.digest }}
